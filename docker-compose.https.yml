services:
  web:
    ports: !reset []

  caddy:
    image: caddy:2.8-alpine
    container_name: game-design-school-caddy
    depends_on:
      - web
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_DOMAIN: "${PUBLIC_DOMAIN}"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

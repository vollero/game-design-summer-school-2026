services:
  collab:
    image: node:22-alpine
    container_name: game-design-school-collab
    environment:
      PORT: 3001
    command: ["node", "/app/server/collab-server.js"]
    volumes:
      - ./server:/app/server:ro
    restart: unless-stopped

  web:
    image: nginx:1.27-alpine
    container_name: game-design-school-web
    depends_on:
      - collab
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - .:/srv/materiale:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

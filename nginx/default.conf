server {
    listen 80;
    server_name _;

    root /srv/materiale/site;
    index index.html;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    location /docs/ {
        alias /srv/materiale/docs/;
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }

    location /api/collab/health {
        proxy_pass http://collab:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ws {
        proxy_pass http://collab:3001/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location ~* \.(js|css|json|html)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store";
    }
}
